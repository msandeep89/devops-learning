name: Daily Learning Reminder

on:
  schedule:
    # 04:00 UTC = 09:30 AM IST, every day Monday-Friday
    - cron: "0 4 * * 1-5"
  workflow_dispatch:  # run manually from the Actions tab

permissions:
  issues: write
  contents: read

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse progress and create reminder issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const progress = fs.readFileSync('PROGRESS.md', 'utf8');

            // Extract module status table rows
            const lines = progress.split('\n');
            const moduleLines = lines.filter(l => l.startsWith('| 0'));

            let done = [], remaining = [];
            for (const line of moduleLines) {
              const cols = line.split('|').map(c => c.trim()).filter(Boolean);
              const num = cols[0];
              const topic = cols[1];
              const status = cols[2];
              if (status.includes('✅')) {
                done.push(`✅ Module ${num} — ${topic}`);
              } else {
                remaining.push(`🔲 Module ${num} — ${topic}`);
              }
            }

            // Find next module to work on
            const next = remaining[0] || 'All modules complete! 🎉';

            const today = new Date().toISOString().split('T')[0];
            const body = [
              `## 📅 Daily DevOps Learning Reminder — ${today}`,
              '',
              '### ✅ Completed',
              done.length ? done.join('\n') : '_Nothing completed yet._',
              '',
              '### 🔲 Remaining',
              remaining.length ? remaining.join('\n') : '_All done! Great work._',
              '',
              `### 👉 Work on today`,
              `**${next}**`,
              '',
              '### Steps',
              '1. Open [`PROGRESS.md`](../blob/main/PROGRESS.md) and check off what you complete today',
              '2. Add an entry to the **Daily Log** section at the bottom',
              '3. Commit your progress: `git commit -m "docs: update progress YYYY-MM-DD"`',
              '',
              '---',
              '_This issue is auto-created daily by GitHub Actions. Close it when done for the day._',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📅 Daily Learning Reminder — ${today}`,
              body: body,
              labels: ['daily-reminder'],
            });
